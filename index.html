<!doctype html>
<html lang="he" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Pro Algorithm landing page" />
    <title>Pro Algorithm | נדל"ן ובנייה</title>
    <link rel="icon" type="image/png" href="assets/images/company logos/Favicon-black.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="content.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">דלגו לתוכן</a>

    <header class="site-header" data-animate>
      <nav class="header-shell" aria-label="ניווט ראשי">
        <a class="header-cta" data-content="contact-phone" href="#" aria-label="צרו קשר">
          <span class="desktop-only">צרו קשר</span>
          <span class="mobile-only">צרו קשר</span>
        </a>

        <div class="header-links" data-nav-links></div>

        <a class="brand" href="#hero" aria-label="Pro Algorithm">
          <img data-logo src="assets/images/company logos/MAIN-LOGO.png" alt="Pro Algorithm" />
          <span>נדל״ן ובנייה</span>
        </a>

        <button class="menu-toggle mobile-only" type="button" aria-expanded="false" aria-controls="mobile-nav">
          <span></span>
          <span></span>
          <span></span>
          <span class="sr-only">פתיחת תפריט</span>
        </button>
      </nav>

      <div class="mobile-nav" id="mobile-nav" data-mobile-nav hidden></div>
    </header>

    <main id="main">
      <section class="hero section-dark" id="hero" aria-labelledby="hero-title">
        <div class="hero-media" aria-hidden="true" data-hero-media></div>
        <div class="hero-overlay" aria-hidden="true"></div>
        <div class="container hero-inner" data-animate>
          <article class="hero-card">
            <p class="eyebrow" data-content="hero-eyebrow"></p>
            <h1 id="hero-title" data-content="hero-title"></h1>
            <p data-content="hero-body"></p>
          </article>
        </div>
      </section>

      <section class="expertise" id="expertise" aria-labelledby="expertise-heading">
        <div class="container section-heading" data-animate>
          <p class="section-kicker" data-content="expertise-eyebrow"></p>
          <h2 id="expertise-heading" data-content="expertise-title"></h2>
        </div>
        <div class="container expertise-stage" data-animate="scroll">
          <div class="expertise-grid" data-expertise-list></div>
        </div>
      </section>

      <section class="solutions-intro" aria-labelledby="solutions-heading">
        <div class="container section-heading" data-animate>
          <p class="section-kicker" data-content="solutions-eyebrow"></p>
          <h2 id="solutions-heading" data-content="solutions-title"></h2>
        </div>
      </section>

      <section class="solutions" id="solutions" aria-label="פתרונות">
        <div class="container solutions-shell">
          <div class="solutions-media" data-projects-media aria-hidden="true"></div>
          <div class="solution-viewport" data-solutions-track tabindex="0" aria-label="גלריית פתרונות"></div>
          <div class="solution-controls" aria-label="ניווט פתרונות">
            <div class="solution-count" aria-live="polite">
              <span data-solution-current>01</span>
              <span>/</span>
              <span data-solution-total>05</span>
            </div>
          </div>
        </div>
      </section>

      <section class="stats" aria-label="נתונים" data-animate>
        <div class="container stats-grid" data-stats-list></div>
      </section>

      <section class="podcast" id="podcast" aria-labelledby="podcast-heading">
        <div class="container section-heading" data-animate>
          <p class="section-kicker" data-content="podcast-eyebrow"></p>
          <h2 id="podcast-heading" data-content="podcast-title"></h2>
          <p data-content="podcast-body"></p>
        </div>
        <div class="container carousel-block">
          <div class="video-layout" data-podcast-list tabindex="0" aria-label="סרטוני יוטיוב"></div>
          <div class="carousel-actions">
            <a class="btn btn-primary" data-content="podcast-all" href="#" target="_blank" rel="noreferrer"></a>
          </div>
        </div>
      </section>

      <section class="media" id="media" aria-labelledby="media-heading">
        <div class="container section-heading" data-animate>
          <p class="section-kicker" data-content="media-eyebrow"></p>
          <h2 id="media-heading" data-content="media-title"></h2>
          <p data-content="media-body"></p>
        </div>
        <div class="container carousel-block">
          <div class="media-layout recommendations" data-media-list tabindex="0" aria-label="המלצות ותקשורת"></div>
          <div class="carousel-actions">
            <button class="circle-btn" type="button" data-scroll-prev="media" aria-label="גלילה ימינה">‹</button>
            <button class="circle-btn" type="button" data-scroll-next="media" aria-label="גלילה שמאלה">›</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer" id="footer">
      <div class="footer-bg" aria-hidden="true" data-footer-bg></div>
      <div class="container footer-inner" data-animate>
        <img class="footer-logo" data-logo-white src="assets/images/company logos/MAIN-LOGO white.png" alt="Pro Algorithm" />
        <h2 data-content="footer-title"></h2>
        <div class="button-row">
          <a class="btn btn-primary" data-content="primary-cta" href="#"></a>
          <a class="btn btn-outline" data-content="secondary-cta" href="#"></a>
        </div>
        <div class="footer-bottom">
          <div class="footer-brand-left">
            <div class="socials" data-social-links></div>
            <p data-content="copyright"></p>
          </div>
          <div class="footer-brand">
            <img class="footer-bottom-logo" data-logo-white src="assets/images/company logos/MAIN-LOGO white.png" alt="Pro Algorithm" />
            <p data-content="footer-body"></p>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
